name: CI/CD Docker Build and Push

# Điều kiện kích hoạt: Mỗi khi Push code lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ Github (Robot Checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub (Robot Login)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Bước 3: Build Image và Push lên Docker Hub (Robot Build & Push)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đặt tên Image theo định dạng: user_docker/ten_du_an:tag
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/spring-boot-app:${{ github.sha }}